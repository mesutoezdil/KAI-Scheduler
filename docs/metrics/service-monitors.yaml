apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: binder
  namespace: kai-scheduler
  labels:
    accounting: kai-scheduler
spec:
  jobLabel: app
  namespaceSelector:
    matchNames:
      - kai-scheduler
  selector:
    matchLabels:
      app: binder
  endpoints:
    - port: http-metrics
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: scheduler-default
  namespace: kai-scheduler
  labels:
    accounting: kai-scheduler
spec:
  jobLabel: app
  namespaceSelector:
    matchNames:
      - kai-scheduler
  selector:
    matchLabels:
      # The default SchedulingShard is named "default", and the scheduler
      # service name is "<schedulerName>-<shardName>".
      app: kai-scheduler-default
  endpoints:
    - port: http-metrics
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: queue-controller
  namespace: kai-scheduler
  labels:
    accounting: kai-scheduler
spec:
  jobLabel: app
  namespaceSelector:
    matchNames:
      - kai-scheduler
  selector:
    matchLabels:
      app: queue-controller
  endpoints:
    - port: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dcgm-exporter
  namespace: kai-scheduler
  labels:
    accounting: kai-scheduler
spec:
  jobLabel: app
  namespaceSelector:
    matchNames:
      - gpu-operator
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter
  endpoints:
    - port: gpu-metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-state-metrics
  namespace: kai-scheduler
  labels:
    accounting: kai-scheduler
spec:
  jobLabel: app.kubernetes.io/name
  namespaceSelector:
    matchNames:
      - monitoring
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  endpoints:
    - port: http
      interval: 30s
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
