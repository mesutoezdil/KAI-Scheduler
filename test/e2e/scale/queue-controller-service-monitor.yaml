apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: queue-controller
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  jobLabel: queue-controller
  namespaceSelector:
    matchNames:
      - kai-scheduler
  selector:
    matchLabels:
      app: queue-controller
  endpoints:
    - port: metrics
