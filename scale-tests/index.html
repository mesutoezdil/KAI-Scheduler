<!--
  Scale Tests Dashboard — KAI Scheduler
  Fetches scale-test results from an S3 bucket and renders them client-side.

  S3 manifest expected at: ${S3_BASE_URL}/Public/manifest.json
  Format:
    {
      "runs": [
        {
          "timestamp": "2026-06-29T08:42:33Z",
          "path": "Public/results_main_<timestamp>_<commit>_<run-id>.json",
          "commit": "..."
        }
      ]
    }

  The canonical result is generated by test/e2e/scale. Legacy Ginkgo reports are
  temporarily supported until 2026-07-30.

  The placeholder __S3_BASE_URL__ in app.js is replaced by the deploy workflow using the
  SCALE_TESTS_S3_URL repository variable.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAI Scheduler — Scale Tests</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css?v=8fab211af6e482be7f4b0a75dbf59571909c496a">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>

<!-- ── Page header ─────────────────────────────────────────────────────── -->
<header class="page-header">
  <img src="logo.svg" width="32" height="32" alt="KAI Scheduler Logo" aria-hidden="true">
  <h1>KAI Scheduler — Scale Tests</h1>
  <div class="header-stats" id="header-stats" aria-live="polite"></div>
</header>

<!-- ── Tab navigation ──────────────────────────────────────────────── -->
<nav class="tabs">
  <button class="tab" data-tab="runs">Test Runs</button>
  <button class="tab active" data-tab="metrics">Metrics</button>
</nav>

<!-- ── Controls (Test Runs tab) ────────────────────────────────────────── -->
<div class="controls tab-content hidden" data-content="runs">
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
      <path fill="var(--muted)" d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.868-3.833zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
    </svg>
    <input class="search" id="search" type="search" placeholder="Search tests, details, output, failure messages…" autocomplete="off">
  </div>

  <div class="sep" aria-hidden="true"></div>
  <span class="ctrl-label">Sort</span>
  <div class="btn-group" role="group" aria-label="Sort order">
    <button class="active" data-sort="time">Time</button>
    <button data-sort="name">Name</button>
    <button data-sort="status">Status</button>
  </div>
  <div class="btn-group">
    <button id="sort-dir" title="Toggle sort direction">▼</button>
  </div>

  <div class="sep" aria-hidden="true"></div>
  <div class="filter-group" role="group" aria-label="Filter by status">
    <button class="filter-pill pass active" id="fp-pass" aria-pressed="true"><span class="dot"></span>Passed</button>
    <button class="filter-pill fail active" id="fp-fail" aria-pressed="true"><span class="dot"></span>Failed</button>
    <button class="filter-pill skip active" id="fp-skip" aria-pressed="true"><span class="dot"></span>Skipped</button>
  </div>
</div>

<!-- ── Summary strip ───────────────────────────────────────────────────── -->
<div class="summary tab-content hidden" data-content="runs" id="summary" aria-live="polite">Loading…</div>

<!-- ── Run list ────────────────────────────────────────────────────────── -->
<main id="main" class="tab-content hidden" data-content="runs">
  <div class="msg"><div class="spinner"></div><br>Fetching scale test results…</div>
</main>

<!-- ── Metrics view ────────────────────────────────────────────────────── -->
<main id="metrics-main" class="tab-content" data-content="metrics">
  <div class="metrics-grid" id="metrics-grid"></div>
</main>

<script src="results.js?v=8fab211af6e482be7f4b0a75dbf59571909c496a"></script>
<script src="results-view.js?v=8fab211af6e482be7f4b0a75dbf59571909c496a"></script>
<script src="metrics-data.js?v=8fab211af6e482be7f4b0a75dbf59571909c496a"></script>
<script src="app.js?v=8fab211af6e482be7f4b0a75dbf59571909c496a"></script>
<script src="metrics.js?v=8fab211af6e482be7f4b0a75dbf59571909c496a"></script>
</body>
</html>
